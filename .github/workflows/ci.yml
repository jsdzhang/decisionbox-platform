name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  detect-changes:
    name: Detect Changes
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
    outputs:
      go: ${{ steps.filter.outputs.go }}
      dashboard: ${{ steps.filter.outputs.dashboard }}
    steps:
      - uses: actions/checkout@v4

      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            go:
              - 'services/**'
              - 'libs/**'
              - 'providers/**'
              - '.golangci.yml'
            dashboard:
              - 'ui/dashboard/**'

  go-build:
    name: Go Build
    runs-on: ubuntu-latest
    needs: detect-changes
    if: needs.detect-changes.outputs.go == 'true'
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.25'
          cache-dependency-path: |
            services/api/go.sum
            services/agent/go.sum

      - name: Build API
        run: cd services/api && go build -o ../../bin/decisionbox-api .

      - name: Build Agent
        run: cd services/agent && go build -o ../../bin/decisionbox-agent .

  go-test:
    name: Go Test
    runs-on: ubuntu-latest
    needs: detect-changes
    if: needs.detect-changes.outputs.go == 'true'
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.25'
          cache-dependency-path: |
            services/api/go.sum
            services/agent/go.sum

      - name: Test with coverage
        run: |
          COV="${GITHUB_WORKSPACE}/coverage"
          mkdir -p "$COV"
          (cd libs/go-common && go test -coverprofile="$COV/go-common.txt" ./...)
          (cd providers/llm/claude && go test -coverprofile="$COV/llm-claude.txt" ./...)
          (cd providers/llm/openai && go test -coverprofile="$COV/llm-openai.txt" ./...)
          (cd providers/llm/ollama && go test -coverprofile="$COV/llm-ollama.txt" ./...)
          (cd providers/llm/vertex-ai && go test -coverprofile="$COV/llm-vertex.txt" ./...)
          (cd providers/llm/bedrock && go test -coverprofile="$COV/llm-bedrock.txt" ./...)
          (cd providers/llm/azure-foundry && go test -coverprofile="$COV/llm-azure-foundry.txt" ./...)
          (cd providers/secrets/mongodb && go test -coverprofile="$COV/secrets-mongodb.txt" ./...)
          (cd providers/secrets/gcp && go test -coverprofile="$COV/secrets-gcp.txt" ./...)
          (cd providers/secrets/aws && go test -coverprofile="$COV/secrets-aws.txt" ./...)
          (cd providers/secrets/azure && go test -coverprofile="$COV/secrets-azure.txt" ./...)
          (cd providers/warehouse/bigquery && go test -coverprofile="$COV/warehouse-bigquery.txt" ./...)
          (cd providers/warehouse/databricks && go test -coverprofile="$COV/warehouse-databricks.txt" ./...)
          (cd providers/warehouse/mssql && go test -coverprofile="$COV/warehouse-mssql.txt" ./...)
          (cd providers/warehouse/redshift && go test -coverprofile="$COV/warehouse-redshift.txt" ./...)
          (cd providers/warehouse/postgres && go test -coverprofile="$COV/warehouse-postgres.txt" ./...)
          (cd providers/warehouse/snowflake && go test -coverprofile="$COV/warehouse-snowflake.txt" ./...)
          (cd providers/embedding/azure-openai && go test -coverprofile="$COV/embedding-azure-openai.txt" ./...)
          (cd providers/embedding/bedrock && go test -coverprofile="$COV/embedding-bedrock.txt" ./...)
          (cd providers/embedding/openai && go test -coverprofile="$COV/embedding-openai.txt" ./...)
          (cd providers/embedding/ollama && go test -coverprofile="$COV/embedding-ollama.txt" ./...)
          (cd providers/embedding/vertex-ai && go test -coverprofile="$COV/embedding-vertex-ai.txt" ./...)
          (cd providers/embedding/voyage && go test -coverprofile="$COV/embedding-voyage.txt" ./...)
          (cd libs/go-common/vectorstore/qdrant && go test -coverprofile="$COV/vectorstore-qdrant.txt" ./...)
          (cd services/agent && go test -coverprofile="$COV/agent.txt" ./...)
          (cd services/api && go test -coverprofile="$COV/api.txt" ./...)

      - name: Merge coverage profiles
        run: |
          echo "mode: set" > coverage/coverage.txt
          for f in coverage/*.txt; do
            [ "$f" = "coverage/coverage.txt" ] && continue
            tail -n +2 "$f" | sed 's|github.com/decisionbox-io/decisionbox/||g' >> coverage/coverage.txt
          done

      - name: Upload Go coverage to Codecov
        uses: codecov/codecov-action@v5
        with:
          files: coverage/coverage.txt
          flags: go
          token: ${{ secrets.CODECOV_TOKEN }}

  go-lint:
    name: Go Lint
    runs-on: ubuntu-latest
    needs: detect-changes
    if: needs.detect-changes.outputs.go == 'true'
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.25'
          cache-dependency-path: |
            services/api/go.sum
            services/agent/go.sum

      - name: Lint go-common
        uses: golangci/golangci-lint-action@v7
        with:
          version: v2.11.3
          working-directory: libs/go-common

      - name: Lint Databricks warehouse provider
        uses: golangci/golangci-lint-action@v7
        with:
          version: v2.11.3
          working-directory: providers/warehouse/databricks

      - name: Lint MSSQL warehouse provider
        uses: golangci/golangci-lint-action@v7
        with:
          version: v2.11.3
          working-directory: providers/warehouse/mssql

      - name: Lint PostgreSQL warehouse provider
        uses: golangci/golangci-lint-action@v7
        with:
          version: v2.11.3
          working-directory: providers/warehouse/postgres

      - name: Lint Redshift warehouse provider
        uses: golangci/golangci-lint-action@v7
        with:
          version: v2.11.3
          working-directory: providers/warehouse/redshift

      - name: Lint Snowflake warehouse provider
        uses: golangci/golangci-lint-action@v7
        with:
          version: v2.11.3
          working-directory: providers/warehouse/snowflake

      - name: Lint Azure secrets provider
        uses: golangci/golangci-lint-action@v7
        with:
          version: v2.11.3
          working-directory: providers/secrets/azure

      - name: Lint Azure OpenAI embedding provider
        uses: golangci/golangci-lint-action@v7
        with:
          version: v2.11.3
          working-directory: providers/embedding/azure-openai

      - name: Lint Bedrock embedding provider
        uses: golangci/golangci-lint-action@v7
        with:
          version: v2.11.3
          working-directory: providers/embedding/bedrock

      - name: Lint OpenAI embedding provider
        uses: golangci/golangci-lint-action@v7
        with:
          version: v2.11.3
          working-directory: providers/embedding/openai

      - name: Lint Ollama embedding provider
        uses: golangci/golangci-lint-action@v7
        with:
          version: v2.11.3
          working-directory: providers/embedding/ollama

      - name: Lint Vertex AI embedding provider
        uses: golangci/golangci-lint-action@v7
        with:
          version: v2.11.3
          working-directory: providers/embedding/vertex-ai

      - name: Lint Voyage embedding provider
        uses: golangci/golangci-lint-action@v7
        with:
          version: v2.11.3
          working-directory: providers/embedding/voyage

      - name: Lint Qdrant vectorstore provider
        uses: golangci/golangci-lint-action@v7
        with:
          version: v2.11.3
          working-directory: libs/go-common/vectorstore/qdrant

      - name: Lint Agent
        uses: golangci/golangci-lint-action@v7
        with:
          version: v2.11.3
          working-directory: services/agent

      - name: Lint API
        uses: golangci/golangci-lint-action@v7
        with:
          version: v2.11.3
          working-directory: services/api

  dashboard-build:
    name: Dashboard Build
    runs-on: ubuntu-latest
    needs: detect-changes
    if: needs.detect-changes.outputs.dashboard == 'true'
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: ui/dashboard/package-lock.json

      - name: Install dependencies
        run: cd ui/dashboard && npm ci

      - name: Build
        run: cd ui/dashboard && npm run build

  dashboard-test:
    name: Dashboard Test & Lint
    runs-on: ubuntu-latest
    needs: detect-changes
    if: needs.detect-changes.outputs.dashboard == 'true'
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: ui/dashboard/package-lock.json

      - name: Install dependencies
        run: cd ui/dashboard && npm ci

      - name: Test with coverage
        run: cd ui/dashboard && npm test -- --coverage --coverageReporters=lcov

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v5
        with:
          directory: ui/dashboard/coverage
          flags: dashboard
          token: ${{ secrets.CODECOV_TOKEN }}

      - name: Lint
        run: cd ui/dashboard && npm run lint

  license-check:
    name: License Check
    runs-on: ubuntu-latest
    needs: detect-changes
    if: needs.detect-changes.outputs.go == 'true' || needs.detect-changes.outputs.dashboard == 'true'
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.25'
          cache-dependency-path: |
            services/api/go.sum
            services/agent/go.sum

      - name: Install Grant
        run: |
          set -uo pipefail
          for attempt in 1 2 3; do
            echo "Install attempt ${attempt}/3"
            curl -sSfL https://raw.githubusercontent.com/anchore/grant/main/install.sh | sh -s -- -b /usr/local/bin || true
            if command -v grant >/dev/null 2>&1; then
              echo "grant installed at $(command -v grant)"
              exit 0
            fi
            echo "grant not on PATH after install; retrying in 10s"
            sleep 10
          done
          echo "Failed to install grant after 3 attempts" >&2
          exit 1

      - name: Check Agent licenses
        run: grant check dir:services/agent -c .grant.yaml

      - name: Check API licenses
        run: grant check dir:services/api -c .grant.yaml

  # Optional: triggered by PR label or manual dispatch
  integration-tests:
    name: Integration Tests
    runs-on: ubuntu-latest
    needs: detect-changes
    if: |
      needs.detect-changes.outputs.go == 'true' &&
      (contains(github.event.pull_request.labels.*.name, 'run-integration-tests') || github.event_name == 'push')
    services:
      mongodb:
        image: mongo:7
        ports:
          - 27017:27017
        options: >-
          --health-cmd "mongosh --eval 'db.runCommand({ping:1})'"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.25'
          cache-dependency-path: |
            services/api/go.sum
            services/agent/go.sum

      - name: Agent integration tests
        env:
          MONGODB_URI: mongodb://localhost:27017
          MONGODB_DB: decisionbox_test
        run: |
          COV="${GITHUB_WORKSPACE}/coverage"
          mkdir -p "$COV"
          (cd services/agent && go test -tags=integration -count=1 -timeout=5m -coverprofile="$COV/agent-integ.txt" .)
          (cd services/agent && go test -tags=integration -count=1 -timeout=5m -coverprofile="$COV/agent-db-integ.txt" ./internal/database/)

      - name: API integration tests
        env:
          MONGODB_URI: mongodb://localhost:27017
          MONGODB_DB: decisionbox_test
        run: |
          COV="${GITHUB_WORKSPACE}/coverage"
          mkdir -p "$COV"
          (cd services/api && go test -tags=integration -count=1 -timeout=5m -coverprofile="$COV/api-integ.txt" .)
          (cd services/api && go test -tags=integration -count=1 -timeout=5m -coverprofile="$COV/api-db-integ.txt" ./database/)
          (cd services/api && go test -tags=integration -count=1 -timeout=5m -coverprofile="$COV/api-handler-integ.txt" ./internal/handler/)

      - name: Secrets provider integration tests
        env:
          MONGODB_URI: mongodb://localhost:27017
          MONGODB_DB: decisionbox_test
        run: |
          COV="${GITHUB_WORKSPACE}/coverage"
          mkdir -p "$COV"
          cd providers/secrets/mongodb && go test -tags=integration -count=1 -timeout=5m -coverprofile="$COV/secrets-mongodb-integ.txt" ./...

      - name: Merge integration coverage profiles
        run: |
          echo "mode: set" > coverage/coverage.txt
          for f in coverage/*-integ.txt; do
            [ -f "$f" ] || continue
            tail -n +2 "$f" | sed 's|github.com/decisionbox-io/decisionbox/||g' >> coverage/coverage.txt
          done

      - name: Upload integration coverage to Codecov
        uses: codecov/codecov-action@v5
        with:
          files: coverage/coverage.txt
          flags: integration
          token: ${{ secrets.CODECOV_TOKEN }}
