# DecisionBox Platform — Docker Compose
# Local development and deployment reference.
#
# Usage:
#   docker compose up -d              # start all services
#   docker compose up -d mongodb      # start MongoDB only (for make dev-api)
#   docker compose down -v            # stop all + remove volumes
#
# For local dev without Docker:
#   make dev-api                      # runs API directly (needs MongoDB on localhost:27017)
#   make dev-dashboard                # runs dashboard directly
#
# All environment variables documented below. Override values directly or set env vars before running.

services:
  mongodb:
    image: mongo:7.0
    container_name: decisionbox-mongodb
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
    environment:
      MONGO_INITDB_DATABASE: decisionbox
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5

  qdrant:
    image: qdrant/qdrant:v1.13.6
    container_name: decisionbox-qdrant
    ports:
      - "6333:6333"   # REST API (debug/admin)
      - "6334:6334"   # gRPC (application traffic)
    volumes:
      - qdrant_data:/qdrant/storage
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:6333/healthz || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  api:
    build:
      context: .
      dockerfile: services/api/Dockerfile
    container_name: decisionbox-api
    ports:
      - "8080:8080"
    environment:
      # ============================================================
      # CORE — Required
      # ============================================================

      # MongoDB connection string
      # Values: any valid MongoDB URI
      # Examples: mongodb://localhost:27017, mongodb+srv://user:pass@cluster.mongodb.net
      - MONGODB_URI=mongodb://mongodb:27017

      # MongoDB database name
      # Values: any valid database name
      - MONGODB_DB=decisionbox

      # API listen port
      # Values: any available port number
      - PORT=8080

      # ============================================================
      # QDRANT — Optional (enables vector search)
      # ============================================================

      # Qdrant gRPC address. If empty, vector search is disabled.
      # Values: host:port
      - QDRANT_URL=qdrant:6334

      # Qdrant API key (optional, for secured instances)
      # Values: any string
      #- QDRANT_API_KEY=

      # ============================================================
      # LLM — Required for discovery (secret)
      # ============================================================

      # LLM API keys are stored per-project in the secret provider (not env vars).
      # Set them via the dashboard: Project Settings → Secrets → LLM API Key

      # ============================================================
      # SECRETS — Per-project secret management
      # ============================================================

      # Secret provider
      # mongodb: AES-256 encrypted MongoDB collection (default, local dev)
      # gcp: Google Cloud Secret Manager (production GCP)
      # aws: AWS Secrets Manager (production AWS)
      # azure: Azure Key Vault (production Azure)
      - SECRET_PROVIDER=mongodb

      # Namespace prefix for all secrets (prevents conflicts in shared cloud accounts)
      # Values: any string (e.g., decisionbox, decisionbox-prod, decisionbox-staging)
      - SECRET_NAMESPACE=decisionbox

      # Encryption key for MongoDB secret provider (base64-encoded 32-byte key)
      # Values: base64 string (generate with: openssl rand -base64 32)
      # Required for encrypted storage. If empty, secrets stored in plaintext with warning.
      - SECRET_ENCRYPTION_KEY=${SECRET_ENCRYPTION_KEY:-}

      # GCP Secret Manager (only when SECRET_PROVIDER=gcp)
      # Values: GCP project ID
      # - SECRET_GCP_PROJECT_ID=my-gcp-project

      # AWS Secrets Manager (only when SECRET_PROVIDER=aws)
      # Values: AWS region
      # - SECRET_AWS_REGION=us-east-1

      # Azure Key Vault (only when SECRET_PROVIDER=azure)
      # Values: full vault URL (e.g., https://my-vault.vault.azure.net/)
      # - SECRET_AZURE_VAULT_URL=https://my-vault.vault.azure.net/

      # ============================================================
      # AGENT RUNNER — How the API spawns discovery agents
      # ============================================================

      # Runner mode
      # Values: subprocess | kubernetes
      # subprocess: exec.Command (local dev, agent binary must be in PATH)
      # kubernetes: creates K8s Job per discovery run (production)
      - RUNNER_MODE=subprocess

      # Agent container image (only used when RUNNER_MODE=kubernetes)
      # Values: any valid container image reference
      - AGENT_IMAGE=ghcr.io/decisionbox-io/decisionbox-agent:latest

      # K8s namespace for agent Jobs (only used when RUNNER_MODE=kubernetes)
      # Values: any valid K8s namespace
      - AGENT_NAMESPACE=default

      # Agent resource requests/limits (only used when RUNNER_MODE=kubernetes)
      # Values: K8s resource quantities (e.g., 250m, 1, 2, 100Mi, 1Gi)
      - AGENT_CPU_REQUEST=250m
      - AGENT_CPU_LIMIT=2
      - AGENT_MEMORY_REQUEST=256Mi
      - AGENT_MEMORY_LIMIT=1Gi

      # Max time (hours) to watch a discovery job before timing out
      # Values: any positive integer (default: 6)
      - AGENT_JOB_TIMEOUT_HOURS=6

      # HTTP timeout per LLM API call made by the API (executive
      # summary, /ask, pack-gen). Go duration string (e.g. 5m, 15m).
      # Per-project timeout_seconds in the LLM config overrides this.
      # When unset, providers use their hard-coded default (60s for
      # Claude direct API, 5m for OpenAI/Ollama/Bedrock/Vertex/Azure
      # Foundry). Set the same value on the agent service so
      # discovery matches.
      # - LLM_TIMEOUT=15m

      # ============================================================
      # TELEMETRY — Anonymous usage metrics
      # ============================================================

      # Enable anonymous telemetry (see TELEMETRY.md for details)
      # Values: true | false
      # Also respects DO_NOT_TRACK=1 (https://consoledonottrack.com/)
      - TELEMETRY_ENABLED=true

      # ============================================================
      # SERVICE — Operational
      # ============================================================

      # Service name (appears in logs)
      # Values: any string
      - SERVICE_NAME=decisionbox-api

      # Environment (affects log format: dev=console, prod=JSON)
      # Values: dev | prod | production
      - ENV=dev

      # Log level
      # Values: debug | info | warn | error
      - LOG_LEVEL=info

    depends_on:
      mongodb:
        condition: service_healthy
    restart: unless-stopped

  agent:
    build:
      context: .
      dockerfile: services/agent/Dockerfile
    container_name: decisionbox-agent
    profiles:
      - agent  # only starts with: docker compose --profile agent run agent
    environment:
      # ============================================================
      # CORE — Required
      # ============================================================

      # MongoDB connection (same as API — agent reads project config and writes results)
      # Values: any valid MongoDB URI
      - MONGODB_URI=mongodb://mongodb:27017

      # MongoDB database name (must match API)
      # Values: any valid database name
      - MONGODB_DB=decisionbox

      # ============================================================
      # LLM — Agent behavior tuning
      # ============================================================

      # LLM API keys are stored per-project in the secret provider (not env vars).
      # Set them via the dashboard: Project Settings → Secrets → LLM API Key

      # Max retries on LLM API errors (rate limits, timeouts)
      # Values: any integer, 0 = no retries
      - LLM_MAX_RETRIES=3

      # Timeout per LLM API call
      # Values: Go duration string (e.g., 30s, 2m, 120s)
      - LLM_TIMEOUT=120s

      # Delay between consecutive LLM calls (rate limiting / cost control)
      # Values: milliseconds (0 = no delay)
      - LLM_REQUEST_DELAY_MS=1000

      # ============================================================
      # SECRETS — Per-project secret management (must match API config)
      # ============================================================

      # Same secret provider config as API — agent reads secrets from same store
      - SECRET_PROVIDER=mongodb
      - SECRET_NAMESPACE=decisionbox
      # Values: base64 string (generate with: openssl rand -base64 32)
      - SECRET_ENCRYPTION_KEY=${SECRET_ENCRYPTION_KEY:-}
      # - SECRET_GCP_PROJECT_ID=my-gcp-project
      # - SECRET_AWS_REGION=us-east-1
      # - SECRET_AZURE_VAULT_URL=https://my-vault.vault.azure.net/

      # ============================================================
      # TELEMETRY — Anonymous usage metrics
      # ============================================================

      # Same as API — agent shares the install ID
      - TELEMETRY_ENABLED=true

      # ============================================================
      # SERVICE — Operational
      # ============================================================

      # Service name (appears in logs)
      # Values: any string
      - SERVICE_NAME=decisionbox-agent

      # Environment (affects log format: dev=console, prod=JSON)
      # Values: dev | prod | production
      - ENV=dev

      # Log level
      # Values: debug | info | warn | error
      - LOG_LEVEL=info

    depends_on:
      mongodb:
        condition: service_healthy

  dashboard:
    build:
      context: ui/dashboard
      dockerfile: Dockerfile
    container_name: decisionbox-dashboard
    ports:
      - "3000:3000"
    environment:
      # ============================================================
      # DASHBOARD — Frontend configuration
      # ============================================================

      # Backend API URL (server-side only — NOT exposed to browser)
      # Next.js rewrites proxy /api/* requests to this URL server-side.
      # Values: full URL including protocol and port
      # For docker-compose: http://api:8080 (service name)
      # For K8s: http://decisionbox-api:8080 (cluster-internal service)
      # For local dev: http://localhost:8080 (default)
      - API_URL=http://api:8080

      # Dashboard listen port
      # Values: any available port number
      - PORT=3000

      # Dashboard bind address
      # Values: 0.0.0.0 (all interfaces), 127.0.0.1 (localhost only)
      - HOSTNAME=0.0.0.0

    depends_on:
      - api
    restart: unless-stopped

volumes:
  mongodb_data:
  qdrant_data:
