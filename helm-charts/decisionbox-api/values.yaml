replicaCount: 1

image:
  repository: ghcr.io/decisionbox-io/decisionbox-api
  tag: "main"
  pullPolicy: Always

namespace: decisionbox

nameOverride: ""
fullnameOverride: ""

# Set for private registries (e.g., [{name: ghcr-secret}]). Not needed for public GHCR images.
imagePullSecrets: []

serviceAccountName: "decisionbox-api"
serviceAccountAnnotations: {}
  # GCP:   iam.gke.io/gcp-service-account: "<cluster-name>-api@<project-id>.iam.gserviceaccount.com"
  # AWS:   eks.amazonaws.com/role-arn: "arn:aws:iam::<account-id>:role/<cluster-name>-api"
  # Azure: azure.workload.identity/client-id: "<api-managed-identity-client-id>"
serviceAccountLabels: {}
  # Azure: azure.workload.identity/use: "true"

# Agent service account — created by this chart for agent K8s Jobs.
# Needs Workload Identity annotation for cloud secret + data warehouse access.
agentServiceAccount:
  name: "decisionbox-agent"
  annotations: {}
    # GCP:   iam.gke.io/gcp-service-account: "<cluster-name>-agent@<project-id>.iam.gserviceaccount.com"
    # AWS:   eks.amazonaws.com/role-arn: "arn:aws:iam::<account-id>:role/<cluster-name>-agent"
    # Azure: azure.workload.identity/client-id: "<agent-managed-identity-client-id>"
  labels: {}
    # Azure: azure.workload.identity/use: "true"

# Extra labels added to pod template metadata.
# Required for Azure Workload Identity: azure.workload.identity/use: "true"
podLabels: {}

nodeSelector: {}

containerPort: 8080

env:
  ENV: "prod"
  LOG_LEVEL: "warn"
  MONGODB_DB: "decisionbox"
  SECRET_PROVIDER: "mongodb"
  SECRET_NAMESPACE: "decisionbox"
  RUNNER_MODE: "kubernetes"
  AGENT_IMAGE: "ghcr.io/decisionbox-io/decisionbox-agent:latest"
  AGENT_NAMESPACE: "decisionbox"
  AGENT_SERVICE_ACCOUNT: "decisionbox-agent"
  AGENT_JOB_TIMEOUT_HOURS: "6"
  # LLM_TIMEOUT — HTTP timeout per LLM API call. Go duration format (e.g. "5m", "15m").
  # Set this when long-form generations (executive summary on Opus, large ask responses)
  # need more than the provider default of 5 minutes. Per-project timeout_seconds
  # overrides this. Set the same value on the agent chart so discovery matches.
  # LLM_TIMEOUT: "15m"

extraEnv: {}

# Inject env vars from existing Secrets or ConfigMaps.
# Use this for SECRET_ENCRYPTION_KEY and other sensitive values.
# Example:
#   extraEnvFrom:
#     - secretRef:
#         name: decisionbox-api-secrets   # must contain SECRET_ENCRYPTION_KEY
extraEnvFrom: []

securityContext:
  runAsNonRoot: true
  runAsUser: 1000
  runAsGroup: 1000
  fsGroup: 1000

containerSecurityContext:
  allowPrivilegeEscalation: false
  readOnlyRootFilesystem: true
  runAsNonRoot: true
  runAsUser: 1000
  runAsGroup: 1000
  capabilities:
    drop:
      - ALL
  seccompProfile:
    type: RuntimeDefault

automountServiceAccountToken: true

resources:
  requests:
    cpu: "100m"
    memory: "512Mi"
  limits:
    cpu: "1000m"
    memory: "2Gi"

livenessProbe:
  enabled: true
  path: /health
  port: 8080
  initialDelaySeconds: 15
  periodSeconds: 30
  timeoutSeconds: 5
  failureThreshold: 3

readinessProbe:
  enabled: true
  path: /health
  port: 8080
  initialDelaySeconds: 5
  periodSeconds: 10
  timeoutSeconds: 3
  failureThreshold: 3

service:
  type: ClusterIP
  port: 8080

ingress:
  enabled: false
  ingressClassName: ""
  annotations: {}
  host: ""
  tlsSecretName: ""
  pathType: Prefix
  path: /

rbac:
  enabled: true
  roleName: agent-job-manager
  serviceAccountName: decisionbox-api
  rules:
    - apiGroups: ["batch"]
      resources: ["jobs"]
      verbs: ["create", "get", "list", "delete"]
    - apiGroups: [""]
      resources: ["pods", "pods/log"]
      verbs: ["get", "list"]

# ---------------------------------------------------------------------------
# Infrastructure dependencies (disabled by default — enable per environment)
# ---------------------------------------------------------------------------
# When mongodb.enabled is true, MONGODB_URI is auto-computed from the subchart.
# When mongodb.enabled is false, you MUST provide MONGODB_URI yourself via:
#   env.MONGODB_URI, extraEnv.MONGODB_URI, or extraEnvFrom (secretRef).
# Omitting it will cause a helm install failure.
mongodb:
  enabled: true
  architecture: standalone
  auth:
    enabled: false
    rootPassword: ""
    usernames: []
    passwords: []
    databases: []
  persistence:
    size: 1Gi

# ---------------------------------------------------------------------------
# Vector Search (Qdrant)
# ---------------------------------------------------------------------------
qdrant:
  enabled: false
  # If url is empty, it will be auto-computed based on the subchart service name.
  url: ""
  # If apiKey is provided, a Secret will be created.
  apiKey: ""

  # Subchart overrides (from qdrant-helm)
  # We leave these minimal to avoid "duplicate field" errors in Qdrant config
  persistence:
    enabled: true
    size: 2Gi
